# AgentAngelo.finance — nginx config
# Deploy: cp this to /etc/nginx/sites-available/agentangelo.finance
#         ln -s /etc/nginx/sites-available/agentangelo.finance /etc/nginx/sites-enabled/
#         certbot --nginx -d agentangelo.finance -d www.agentangelo.finance
#         nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name agentangelo.finance www.agentangelo.finance;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name agentangelo.finance www.agentangelo.finance;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/agentangelo.finance/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agentangelo.finance/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20M;
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # TanStack SSR proxy routes — must go to frontend server
    location = /api/chat {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        chunked_transfer_encoding on;
    }
    location = /api/recommendation-chat {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    off;
        chunked_transfer_encoding on;
    }

    # Backend API — all other /api/* routes go to the Express backend
    location /api/ {
        proxy_pass         http://127.0.0.1:3031;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # SSE support for copilot streaming + call status polling
        proxy_read_timeout 120s;
        proxy_buffering    off;
        chunked_transfer_encoding on;
    }

    # Frontend — TanStack Start SSR server
    location / {
        proxy_pass         http://127.0.0.1:3030;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
